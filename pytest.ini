[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    unit: testes unitários isolados (modelo, repositório, serviço)
    integration: testes de integração (rotas web e API)
filterwarnings =
    ignore::DeprecationWarning
