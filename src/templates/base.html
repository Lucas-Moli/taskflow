<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %} · TechFlow Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    },
                    boxShadow: {
                        card: '0 1px 3px rgba(15,23,42,.06), 0 8px 24px rgba(15,23,42,.06)',
                        'card-hover': '0 4px 12px rgba(15,23,42,.08), 0 16px 40px rgba(79,70,229,.12)',
                    }
                }
            }
        }
    </script>
    <style>
        [data-modal].open { display: flex; }
        [data-modal]:not(.open) { display: none; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full min-h-screen bg-slate-950 text-slate-100 font-sans antialiased">
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="absolute -top-40 -right-40 h-[32rem] w-[32rem] rounded-full bg-indigo-600/20 blur-3xl"></div>
        <div class="absolute top-1/3 -left-32 h-96 w-96 rounded-full bg-violet-600/15 blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 h-80 w-80 rounded-full bg-cyan-500/10 blur-3xl"></div>
    </div>

    {% block body %}{% endblock %}

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
